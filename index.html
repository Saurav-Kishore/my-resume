<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saurav Kishore — Profile</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --wa-teal:       #075e54;
  --wa-teal-dark:  #054d44;
  --wa-green:      #25d366;
  --wa-green-light:#dcf8c6;
  --wa-bg:         #e5ddd5;
  --wa-bg-dark:    #d8cfc4;
  --bubble-recv:   #ffffff;
  --bubble-sent:   #dcf8c6;
  --text-primary:  #303030;
  --text-secondary:#667781;
  --text-muted:    #999;
  --shadow-sm:     0 1px 1px rgba(0,0,0,0.06);
  --shadow-md:     0 1px 4px rgba(0,0,0,0.10);
  --shadow-lg:     0 4px 20px rgba(0,0,0,0.12);
  --radius-sm:     8px;
  --radius-md:     10px;
  --radius-lg:     16px;
  --radius-xl:     20px;
  --font:          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: #111;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ── App Shell ────────────────────────────────────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 820px;
  margin: 0 auto;
  background: var(--wa-bg);
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────────────────── */
.header {
  background: var(--wa-teal);
  color: #fff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
  flex-shrink: 0;
}

.header .back-btn {
  font-size: 22px;
  cursor: default;
  opacity: 0.9;
  line-height: 1;
}

.avatar-wrap {
  position: relative;
  flex-shrink: 0;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
  user-select: none;
}

.avatar-wrap::after {
  content: '';
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 11px;
  height: 11px;
  background: var(--wa-green);
  border: 2px solid var(--wa-teal);
  border-radius: 50%;
}

.header-info {
  flex: 1;
  min-width: 0;
}

.header-info .contact-name {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-info .status {
  font-size: 12px;
  opacity: 0.85;
  line-height: 1.3;
}

.header-actions {
  display: flex;
  gap: 8px;
  font-size: 18px;
  opacity: 0.9;
  cursor: default;
}

/* ── Chat Area ────────────────────────────────────────────────────────── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 16px 16px;
  background-color: var(--wa-bg);
  background-image:
    radial-gradient(circle at 20% 30%, rgba(210,200,185,0.35) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(190,180,165,0.3) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(200,190,175,0.2) 0%, transparent 60%);
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}

.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

/* ── Message Row ──────────────────────────────────────────────────────── */
.msg-row {
  display: flex;
  margin-bottom: 2px;
  animation: msgSlideUp 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) both;
}

@keyframes msgSlideUp {
  from {
    opacity: 0;
    transform: translateY(28px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.msg-bubble {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  background: var(--bubble-recv);
  color: var(--text-primary);
  font-size: 14.2px;
  line-height: 1.5;
  word-wrap: break-word;
  position: relative;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}

.msg-bubble:hover {
  box-shadow: var(--shadow-md);
}

/* small tail on first message */
.msg-row:first-of-type .msg-bubble::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 0;
  width: 0;
  height: 0;
  border-right: 8px solid var(--bubble-recv);
  border-top: 8px solid transparent;
}

.msg-time {
  display: block;
  text-align: right;
  font-size: 10.5px;
  color: var(--text-muted);
  margin-top: 4px;
  user-select: none;
}

/* ── Typing Indicator ─────────────────────────────────────────────────── */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 4px;
  animation: fadeIn 0.25s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.typing-dots {
  display: flex;
  gap: 4px;
  padding: 10px 14px;
  background: var(--bubble-recv);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.typing-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #b0b8be;
  animation: dotPulse 1.4s infinite ease-in-out both;
}

.typing-dots span:nth-child(1) { animation-delay: 0.0s; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40%            { transform: scale(1);   opacity: 1;   }
}

/* ── Skill Chips ──────────────────────────────────────────────────────── */
.skill-chip {
  display: inline-block;
  padding: 4px 10px;
  margin: 3px 4px 3px 0;
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  color: #2e7d32;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.2px;
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: default;
}

.skill-chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* ── Time Badge ───────────────────────────────────────────────────────── */
.time-badge {
  display: inline-block;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── Link Styling inside bubbles ──────────────────────────────────────── */
.msg-bubble a {
  color: #1a73e8;
  text-decoration: none;
  font-weight: 500;
}
.msg-bubble a:hover { text-decoration: underline; }

/* ── Footer Input Bar ─────────────────────────────────────────────────── */
.footer {
  background: #f0f2f5;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  z-index: 10;
  border-top: 1px solid #e0e0e0;
}

.footer .footer-icon {
  font-size: 22px;
  color: var(--text-secondary);
  cursor: default;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.footer .input-faux {
  flex: 1;
  padding: 10px 16px;
  background: #fff;
  border-radius: 24px;
  color: #bbb;
  font-size: 14px;
  user-select: none;
  box-shadow: var(--shadow-sm);
}

.footer .mic-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--wa-green);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: default;
  transition: transform 0.2s, box-shadow 0.2s;
}

.footer .mic-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 2px 8px rgba(37,211,102,0.4);
}

/* ── Intro Overlay (fade-in on load) ──────────────────────────────────── */
.intro-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 30%, rgba(7,94,84,0.06) 0%, transparent 70%);
  z-index: 0;
}

/* ── Responsive ───────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .app { max-width: 100%; border-radius: 0; }
  .msg-bubble { max-width: 88%; font-size: 13.5px; }
  .header { padding: 10px 12px; }
  .header .contact-name { font-size: 15px; }
  .chat-area { padding: 14px 10px 10px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <span class="back-btn">←</span>
    <div class="avatar-wrap">
      <div class="avatar" id="avatarInitial">S</div>
    </div>
    <div class="header-info">
      <div class="contact-name" id="contactName">Saurav</div>
      <div class="status" id="contactStatus">online</div>
    </div>
    <div class="header-actions">
      <span>📞</span>
      <span>⋮</span>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="intro-glow"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-icon">😊</span>
    <div class="input-faux">Type a message...</div>
    <div class="mic-btn">🎤</div>
  </div>
</div>

<script>
// ── Profile Data (embedded — no server fetch needed) ──────────────────────
const PROFILE = {
  name: "Saurav Kishore",
  title: "Senior Engineer at Qualcomm | AI & Android Expert",
  location: "Hyderabad, India",
  education: "B.Tech in Computer Science & Engineering",
  university: "The LNM Institute of Information Technology, Jaipur",
  cgpa: "9.01/10.00",
  bio: "Engineered a 24/7 autonomous Multi-Agent AI system for TrustZone security at Qualcomm. Recognised as a top 10% performer at Samsung, spearheaded one of the first AI projects at Samsung Noida — which led to a dedicated 15-engineer AI task force. Built an AI-driven Knowledge Graph powering personalised recommendations for 20M+ OneUI 7 devices.",
  skills: [
    "Java", "Kotlin", "Python", "Android", "MVVM",
    "Kotlin Coroutines", "Jetpack Compose", "System Design",
    "LLM / AI Agents", "RxJava", "Hilt / Dagger",
    "Room / SQLite", "Retrofit", "Scikit-learn",
    "Git / Gerrit", "CI/CD"
  ],
  experience: [
    { role: "Senior Engineer", company: "Qualcomm", years: "Jul 2025 – Present" },
    { role: "Engineer / Android App Developer", company: "Samsung Electronics", years: "Jul 2021 – Jul 2025" },
    { role: "R&D Intern", company: "Samsung Electronics", years: "Jan 2021 – May 2021" }
  ],
  projects: [
    "Galaxy Z Flip5 Cover Screen Phone App — led 3 devs, 10M+ users, won Excellence Award",
    "24/7 Autonomous Multi-Agent AI System — reduced manual monitoring by ~64%, saved ~35 hrs/week",
    "AI Knowledge Graph for Personalised Recommendations — deployed to 20M+ OneUI 7 devices",
    "WearOS Phone App Refactoring — led 5 devs, Kotlin/MVVM migration, ~48% faster launch, ~85% test coverage"
  ],
  patents: [
    "System & Method for Prioritising and Contextualising User Data on User Equipment (Indian Patent, filed Dec 2024)"
  ],
  socials: {
    linkedin: "linkedin.com/in/sauravkishore",
    github: "github.com/Saurav-Kishore",
    email: "saurav.kishore@outlook.com"
  }
};

// ── App ───────────────────────────────────────────────────────────────────
(function () {
  const chatArea   = document.getElementById('chatArea');
  const avatarEl   = document.getElementById('avatarInitial');
  const nameEl     = document.getElementById('contactName');
  const statusEl   = document.getElementById('contactStatus');

  const profile = PROFILE;

  // ── Update header ────────────────────────────────────────────────────
  const initials = profile.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  avatarEl.textContent = initials;
  nameEl.textContent   = profile.name;
  statusEl.textContent = 'online';

  // ── Build message queue ──────────────────────────────────────────────
  const messages = [];

  messages.push("Hi there! 👋<br><span style='font-size:12px;color:#999;'>Welcome to my profile</span>");

  messages.push(
    "My name is <strong>" + profile.name + "</strong>.<br>" +
    "<span style='color:#667781;'>I'm a " + profile.title + " based in " + profile.location + ".</span>"
  );

  if (profile.bio) {
    messages.push(profile.bio);
  }

  var eduMsg = "🎓 I studied <strong>" + profile.education + "</strong> at <em>" + profile.university + "</em>";
  if (profile.cgpa) {
    eduMsg += " <span style='color:#25d366;font-weight:600;'>(CGPA: " + profile.cgpa + ")</span>";
  }
  eduMsg += ".";
  messages.push(eduMsg);

  if (profile.skills && profile.skills.length) {
    const chips = profile.skills.map(s =>
      '<span class="skill-chip">' + s + '</span>'
    ).join(' ');
    messages.push("🛠️ My toolkit:<br><br>" + chips);
  }

  if (profile.experience && profile.experience.length) {
    let expHtml = "💼 <strong>Work Experience</strong><br><br>";
    profile.experience.forEach(e => {
      expHtml +=
        '🔹 <strong>' + e.role + '</strong><br>' +
        '<span style="color:#667781;">' + e.company +
        ' &nbsp;·&nbsp; <span class="time-badge">' + e.years + '</span></span><br><br>';
    });
    messages.push(expHtml);
  }

  if (profile.projects && profile.projects.length) {
    let projHtml = "🚀 <strong>Projects I've built</strong><br><br>";
    profile.projects.forEach(p => {
      projHtml += '✨ ' + p + '<br>';
    });
    messages.push(projHtml);
  }

  if (profile.patents && profile.patents.length) {
    let patentHtml = "📜 <strong>Patents</strong><br><br>";
    profile.patents.forEach(p => {
      patentHtml += '🏆 ' + p + '<br>';
    });
    messages.push(patentHtml);
  }

  if (profile.socials) {
    let socialHtml = "📬 <strong>Let's connect!</strong><br><br>";
    const icons = { github:'🐙', linkedin:'💼', twitter:'🐦', email:'✉️' };
    Object.entries(profile.socials).forEach(([platform, handle]) => {
      const icon = icons[platform] || '🔗';
      socialHtml += icon + ' <strong>' + platform.charAt(0).toUpperCase() + platform.slice(1) +
                    '</strong>: ' + handle + '<br>';
    });
    messages.push(socialHtml);
  }

  messages.push("Thanks for stopping by! 🙏✨");

  // ── Helpers ──────────────────────────────────────────────────────────
  function scrollToBottom() {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
  }

  function nowTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' +
           d.getMinutes().toString().padStart(2,'0');
  }

  function createTypingIndicator() {
    const row = document.createElement('div');
    row.className = 'typing-indicator';
    row.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    chatArea.appendChild(row);
    scrollToBottom();
    return row;
  }

  function createBubble(html) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML =
      '<div class="msg-bubble">' + html +
      '<span class="msg-time">' + nowTime() + '</span></div>';
    chatArea.appendChild(row);
    scrollToBottom();
    return row;
  }

  // ── Sequential reveal ────────────────────────────────────────────────
  async function typeDelay(ms) {
    await new Promise(r => setTimeout(r, ms));
  }

  async function revealMessages() {
    await typeDelay(800);

    for (let i = 0; i < messages.length; i++) {
      const typing = createTypingIndicator();
      const typingDuration = 1000 + Math.random() * 800;
      await typeDelay(typingDuration);

      typing.remove();
      createBubble(messages[i]);

      const readPause = 600 + Math.random() * 500;
      await typeDelay(readPause);
    }

    await typeDelay(1200);
    const seenRow = document.createElement('div');
    seenRow.style.cssText = 'text-align:right;font-size:10.5px;color:#999;padding:4px 0 8px;animation:fadeIn 0.5s ease both;';
    seenRow.textContent = '✓✓ Seen ' + nowTime();
    chatArea.appendChild(seenRow);
    scrollToBottom();
  }

  revealMessages();
})();
</script>
</body>
</html>
